<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoxCrítico·AI · MedUrgencias-UMH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=500;700&family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#B42318;
  --accent-soft:#B423181A;
  --ink:#101828; --ink-2:#475467; --ink-3:#98A2B3;
  --paper:#F2F4F7; --card:#FFFFFF; --line:#E4E7EC;
  --ok:#15803D; --warn:#B45309; --bad:#B42318;
  --r:14px;
  font-size:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:var(--accent)}
/* ---------- header ---------- */
header{background:var(--card);border-bottom:3px solid var(--accent);padding:14px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:20}
.logo{width:42px;height:42px;border-radius:10px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.htitle h1{font-size:1.15rem;line-height:1.2}
.htitle .module{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-2);font-weight:600}
.hspacer{flex:1}
.hbtn{border:1px solid var(--line);background:var(--card);border-radius:9px;padding:8px 13px;font-size:.82rem;font-weight:600;color:var(--ink-2);display:flex;align-items:center;gap:6px}
.hbtn:hover{border-color:var(--accent);color:var(--accent)}
.hbtn.keyok{border-color:var(--ok);color:var(--ok)}
/* ---------- layout ---------- */
main{flex:1;width:100%;max-width:1100px;margin:0 auto;padding:20px 18px 40px;display:flex;flex-direction:column}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:24px;margin-bottom:18px}
.steps{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.step{flex:1;min-width:140px;border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-size:.78rem;font-weight:600;color:var(--ink-3);background:var(--card);display:flex;gap:9px;align-items:center}
.step .n{width:22px;height:22px;border-radius:50%;background:var(--paper);display:flex;align-items:center;justify-content:center;font-size:.72rem;flex-shrink:0}
.step.active{border-color:var(--accent);color:var(--accent)}
.step.active .n{background:var(--accent);color:#fff}
.step.done{color:var(--ok);border-color:var(--ok)}
.step.done .n{background:var(--ok);color:#fff}
.lead{color:var(--ink-2);font-size:.93rem;line-height:1.55;margin:8px 0 16px}
.objetivos{margin:14px 0 4px;padding-left:0;list-style:none}
.objetivos li{font-size:.88rem;color:var(--ink-2);padding:6px 0 6px 26px;position:relative;line-height:1.45}
.objetivos li::before{content:"◆";position:absolute;left:6px;color:var(--accent);font-size:.7rem;top:9px}
label{font-size:.8rem;font-weight:600;color:var(--ink-2);display:block;margin:12px 0 5px}
input[type=text],select,textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:.9rem;font-family:inherit;background:var(--card);color:var(--ink)}
textarea{resize:vertical}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
.btn{background:var(--accent);color:#fff;border-radius:10px;padding:12px 22px;font-weight:700;font-size:.9rem;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:filter .15s}
.btn:hover{filter:brightness(1.1)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.ghost{background:var(--card);color:var(--ink-2);border:1px solid var(--line)}
.btn.ghost:hover{color:var(--accent);border-color:var(--accent);filter:none}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

/* ---------- ARQUITECTURA DE DASHBOARD FIJO (NUEVO) ---------- */
.dashboard-layout {
  display: flex;
  flex-direction: column;
  gap: 16px;
  height: calc(100vh - 140px);
  min-height: 680px;
}
.fixed-control-box {
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex-shrink: 0;
}
.split-control-grid {
  display: grid;
  grid-template-columns: 2.2fr 1fr;
  gap: 14px;
}
@media(max-width: 900px){
  .dashboard-layout { height: auto; }
  .split-control-grid { grid-template-columns: 1fr; }
}

/* ---------- MONITOR DE CONSTANTES VITIALES ---------- */
.monitor-panel {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  background: #0C1017;
  border: 3px solid #1E293B;
  border-radius: var(--r);
  padding: 12px;
  gap: 10px;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
}
.mon-box {
  background: #151C2C;
  border-radius: 8px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 74px;
  border-left: 4px solid #666;
}
.mon-box.fc { border-left-color: #00FF66; color: #00FF66; }
.mon-box.spo2 { border-left-color: #00E5FF; color: #00E5FF; }
.mon-box.ta { border-left-color: #FF3333; color: #FF3333; }
.mon-box.fr { border-left-color: #FFCC00; color: #FFCC00; }
.mon-box.temp { border-left-color: #E0E0E0; color: #E0E0E0; }
.mon-lbl { font-size: .65rem; font-weight: 700; text-transform: uppercase; color: #94A3B8; letter-spacing: 0.05em; }
.mon-val { font-family: monospace; font-size: 1.8rem; font-weight: 700; text-align: right; line-height: 1.1; }
.mon-unit { font-size: .7rem; color: #64748B; margin-left: 2px; }

/* ---------- PANEL DE ACCIONES ABCDE ---------- */
.action-panel {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 14px;
}
.action-title { font-size: .78rem; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; color: var(--ink); border-bottom: 1px solid var(--line); padding-bottom: 5px; letter-spacing: 0.02em; }
.action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
@media(max-width: 600px){ .action-grid { grid-template-columns: repeat(2, 1fr); } .monitor-panel{grid-template-columns: 1fr 1fr;}}
.action-col { display: flex; flex-direction: column; gap: 5px; }
.action-col h4 { font-size: .72rem; font-weight: 700; color: var(--ink-2); margin-bottom: 2px; text-transform: uppercase; border-left: 2px solid var(--accent); padding-left: 4px; }
.btn-act { background: #F8FAFC; border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; font-size: .72rem; font-weight: 500; text-align: left; color: var(--ink-2); transition: all .15s; line-height: 1.2; }
.btn-act:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

/* ---------- COMPOSER / CONTROL CENTRAL (NUEVO) ---------- */
.composer-panel {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 14px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 10px;
}
.composer-area { display: flex; gap: 8px; align-items: stretch; }
.composer-area textarea { flex: 1; min-height: 52px; font-size: .85rem; padding: 8px 10px; border-radius: 8px; }
.composer-area .btn { padding: 0 16px; border-radius: 8px; }
.dashboard-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* ---------- ESCENARIO E INTERVENCIONES EN OTRA CAJA SCOLLABLE (NUEVO) ---------- */
.scroll-history-panel {
  flex: 1;
  overflow-y: auto;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
}
.history-header-title {
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  border-bottom: 1px dashed var(--line);
  padding-bottom: 6px;
}
.esc-box { background: var(--paper); border: 1px solid var(--line); border-radius: 10px; padding: 16px; margin-bottom: 4px; }
.esc-box h2 { font-size: 1rem; margin-bottom: 6px; color: var(--ink); }
.esc-box .tag { display: inline-block; font-size: .65rem; font-weight: 700; text-transform: uppercase; background: var(--accent); color: #fff; border-radius: 4px; padding: 2px 7px; margin-bottom: 8px; }
.esc-box p { font-size: .85rem; line-height: 1.5; color: var(--ink); white-space: pre-wrap; }
.datos { margin-top: 10px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 6px; }
.datos div { font-size: .8rem; background: var(--card); border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px; }

/* ---------- TIMER DE ESTRÉS ---------- */
.timer-box { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: .8rem; color: var(--warn); background: var(--paper); border: 1px solid var(--line); padding: 6px 12px; border-radius: 6px; }
.timer-box.danger { color: var(--bad); animation: pulse 1s infinite alternate; background: var(--accent-soft); }
@keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }

/* ---------- chat logs ---------- */
#msgs { display: flex; flex-direction: column; gap: 10px; }
.msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: .88rem; line-height: 1.5; white-space: pre-wrap; }
.msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 3px; }
.msg.ai { align-self: flex-start; background: var(--paper); border: 1px solid var(--line); border-bottom-left-radius: 3px; }
.msg.sys { align-self: center; background: var(--accent-soft); color: var(--bad); font-size: .75rem; font-weight: 700; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--accent); }

.typing{display:inline-flex;gap:4px;align-items:center}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--ink-3);animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}

/* ---------- evaluación ---------- */
.score-big{font-family:'Space Grotesk';font-size:3rem;font-weight:700;color:var(--accent);line-height:1}
.crit{margin:14px 0}
.crit .head{display:flex;justify-content:space-between;font-size:.85rem;font-weight:600;margin-bottom:5px}
.bar{height:9px;border-radius:6px;background:var(--paper);overflow:hidden}
.bar i{display:block;height:100%;border-radius:6px;background:var(--accent);transition:width .8s ease}
.crit p{font-size:.8rem;color:var(--ink-2);margin-top:5px;line-height:1.5}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.cols{grid-template-columns:1fr}}
.pill-list{list-style:none}
.pill-list li{font-size:.83rem;line-height:1.5;padding:7px 0 7px 24px;position:relative;color:var(--ink-2)}
.pill-list.ok li::before{content:"✓";position:absolute;left:2px;color:var(--ok);font-weight:700}
.pill-list.mej li::before{content:"↗";position:absolute;left:2px;color:var(--warn);font-weight:700}

/* ---------- modales ---------- */
dialog{border:none;border-radius:var(--r);padding:0;max-width:560px;width:92%;box-shadow:0 24px 60px rgba(16,24,40,.25)}
dialog::backdrop{background:rgba(16,24,40,.45)}
.dlg{padding:24px}
.dlg h2{font-size:1.05rem;margin-bottom:10px}
.dlg p{font-size:.85rem;color:var(--ink-2);line-height:1.55;margin-bottom:10px}
.hist-item{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.hist-item .meta{font-size:.8rem;color:var(--ink-2)}
